services:
  fhir-db:
    image: postgres:18-alpine
    container_name: fhir-postgres
    cpus: "0.50"
    mem_limit: 512m
    environment:
      - POSTGRES_DB=hapi
      - POSTGRES_USER=pguser
      - POSTGRES_PASSWORD=pgpass_dev_2026!
    volumes:
      - fhir_postgres_data:/var/lib/postgresql/
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  fhir-server:
    image: hapiproject/hapi:latest
    container_name: fhir-server
    cpus: "1.00"
    mem_limit: 1024m
    expose:
      - "8080"
    environment:
      - spring.datasource.url=jdbc:postgresql://fhir-db:5432/hapi
      - spring.datasource.username=pguser
      - spring.datasource.password=pgpass_dev_2026!
      - spring.datasource.driverClassName=org.postgresql.Driver
      - spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
      - hapi.fhir.tester.home.server_address=http://localhost:8080/fhir
      - hapi.fhir.tester.home.name=Local HAPI FHIR
      - hapi.fhir.subscription.resthook_enabled=true
      - hapi.fhir.subscription.matching_strategy=DATABASE
      - hapi.fhir.subscription.poll_interval=1000
    depends_on:
      fhir-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "java", "-version"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 90s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  fhir-proxy:
    image: nginx:1.27-alpine
    container_name: fhir-proxy
    cpus: "0.50"
    mem_limit: 512m
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./docker/nginx/fhir-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      fhir-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  app-db:
    image: mongo:8.0
    container_name: app-mongo
    cpus: "0.50"
    mem_limit: 512m
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongouser
      - MONGO_INITDB_ROOT_PASSWORD=mongopass_dev_2026!
    volumes:
      - app_mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  fhir_postgres_data:
  app_mongo_data:
