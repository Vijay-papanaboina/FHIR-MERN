services:
  fhir-db:
    image: postgres:18-alpine
    container_name: fhir-postgres
    environment:
      - POSTGRES_DB=hapi
      - POSTGRES_USER=hapi_user
      - POSTGRES_PASSWORD=hapi_password
    volumes:
      - fhir_postgres_data:/var/lib/postgresql/
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hapi"]
      interval: 5s
      timeout: 5s
      retries: 5

  fhir-server:
    image: hapiproject/hapi:latest
    container_name: fhir-server
    ports:
      - "8080:8080"
    environment:
      - spring.datasource.url=jdbc:postgresql://fhir-db:5432/hapi
      - spring.datasource.username=hapi_user
      - spring.datasource.password=hapi_password
      - spring.datasource.driverClassName=org.postgresql.Driver
      - spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
      - hapi.fhir.tester.home.server_address=http://localhost:8080/fhir
      - hapi.fhir.tester.home.name=Local HAPI FHIR
    depends_on:
      fhir-db:
        condition: service_healthy

  app-db:
    image: mongo:8.0
    container_name: app-mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - app_mongo_data:/data/db
    ports:
      - "27017:27017"

volumes:
  fhir_postgres_data:
  app_mongo_data:
